## ─────────────────────────────────────────────────────────────────────────────
##  EduLens — Render Blueprint  (FREE TIER)
##
##  No credit card required.
##
##  Services:
##    1. edulens-backend  — Express + SQLite + WebSocket  (Free web service)
##    2. edulens-teacher  — React teacher dashboard       (Free static site)
##
##  Free tier limitations (fine for Kaggle demo):
##    • Backend sleeps after 15 min of inactivity (first request takes ~30s)
##    • No persistent disk — SQLite data resets on redeploy (demo data only)
##    • WebSocket works but may disconnect on spin-down
##
##  HOW TO USE:
##    1. Push this repo to GitHub
##    2. Render Dashboard → New → Blueprint → connect your repo
##    3. Fill in GROQ_API_KEY when prompted (only secret required)
##    4. Both services deploy automatically — no payment needed
## ─────────────────────────────────────────────────────────────────────────────

services:

  # ──────────────────────────────────────────────────────────────────────────
  # 1. BACKEND  (Express + SQLite + WebSocket) — FREE
  # ──────────────────────────────────────────────────────────────────────────
  - type: web
    name: edulens-backend
    runtime: node
    rootDir: packages/backend
    buildCommand: npm install --include=dev && npx tsc
    startCommand: node dist/index.js
    plan: free
    healthCheckPath: /health

    envVars:
      - key: NODE_ENV
        value: production

      - key: PORT
        value: 10000

      # No persistent disk on free tier — SQLite stored in ephemeral filesystem
      # Data resets on redeploy (acceptable for demo)
      - key: DB_PATH
        value: ./data/edulens.db

      # ── AI (Groq — free, no Ollama needed on Render) ──────────────────────
      # Get free key: https://console.groq.com  (no credit card required)
      - key: GROQ_API_KEY
        sync: false

      - key: GROQ_MODEL
        value: llama-3.3-70b-versatile

      - key: OLLAMA_URL
        value: ""

      # ── Auth ────────────────────────────────────────────────────────────────
      - key: DEFAULT_TEACHER_PIN
        value: "1234"

      # ── QR Code ─────────────────────────────────────────────────────────────
      # Domain embedded in QR so student phones know where to connect.
      # After first deploy, update this to your actual Render URL if different.
      - key: PUBLIC_URL
        value: edulens-backend.onrender.com

  # ──────────────────────────────────────────────────────────────────────────
  # 2. TEACHER DASHBOARD  (React static site) — ALWAYS FREE
  # ──────────────────────────────────────────────────────────────────────────
  - type: web
    name: edulens-teacher
    runtime: static
    buildCommand: >
      ELECTRON_SKIP_BINARY_DOWNLOAD=1 npm install &&
      cd packages/teacher-app &&
      npm run build:web
    staticPublishPath: packages/teacher-app/dist-web

    routes:
      - type: rewrite
        source: /*
        destination: /index.html

    envVars:
      - key: VITE_API_URL
        value: https://edulens-backend.onrender.com

      - key: VITE_WS_URL
        value: wss://edulens-backend.onrender.com

      - key: ELECTRON_SKIP_BINARY_DOWNLOAD
        value: "1"
